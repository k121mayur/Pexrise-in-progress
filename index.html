<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pexhire Portal | Coming Soon</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Font Awesome for Social Media Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            /* Branding Colors based on the logo */
            --primary-blue: #3066b4; /* Hex color from the image reference */
            --dark-blue: #224c8c;
            --light-blue: #e8f0fe;
            --text-main: #333333;
            --text-muted: #666666;
            --white: #ffffff;
            --bg-color: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Subtle Background Decoration */
        .bg-shapes {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .shape {
            position: absolute;
            background: linear-gradient(135deg, rgba(48, 102, 180, 0.05) 0%, rgba(48, 102, 180, 0) 100%);
            border-radius: 50%;
        }

        .shape-1 {
            width: 800px;
            height: 800px;
            top: -400px;
            right: -200px;
        }

        .shape-2 {
            width: 600px;
            height: 600px;
            bottom: -300px;
            left: -150px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 40px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Logo Styling mimicking the image */
        .logo-wrapper {
            margin-bottom: 2rem;
            animation: fadeIn 1.2s ease-in-out forwards;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-main {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .logo-icon {
            width: 70px;
            height: 70px;
            background-color: var(--primary-blue);
            border-radius: 12px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(48, 102, 180, 0.2);
        }

        .logo-icon::before {
            content: 'P';
            color: var(--white);
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 50px;
            line-height: 1;
            margin-left: -5px;
        }

        .logo-icon .decorative-bars {
            position: absolute;
            left: 10px;
            top: 15px;
            height: 40px;
            width: 12px;
            background: repeating-linear-gradient(
                to bottom,
                var(--white),
                var(--white) 6px,
                transparent 6px,
                transparent 10px
            );
        }

        .logo-text {
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 65px;
            color: var(--primary-blue);
            letter-spacing: -1px;
            display: flex;
            align-items: center;
        }

        .logo-text .bars {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-left: 8px;
        }
        
        .logo-text .bars span {
            display: block;
            width: 45px;
            height: 12px;
            background-color: var(--primary-blue);
        }

        .logo-tagline-text {
            font-family: 'Inter', sans-serif;
            color: var(--primary-blue);
            font-size: 22px;
            font-weight: 400;
            margin-top: 5px;
            letter-spacing: 0.5px;
        }

        /* Typography */
        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 1rem;
            line-height: 1.1;
            background: linear-gradient(135deg, var(--text-main) 0%, #000000 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            font-size: 1.25rem;
            color: var(--text-muted);
            margin-bottom: 3rem;
            max-width: 600px;
            line-height: 1.6;
        }

        p.stay-tuned {
            font-weight: 600;
            color: var(--primary-blue);
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 1rem;
            display: inline-block;
            background: var(--light-blue);
            padding: 8px 16px;
            border-radius: 20px;
        }

        /* Form Styling */
        .subscribe-form {
            width: 100%;
            max-width: 500px;
            margin-bottom: 4rem;
        }

        .input-group {
            display: flex;
            background: var(--white);
            border: 1px solid #e1e4e8;
            border-radius: 50px;
            padding: 5px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            transition: all 0.3s ease;
        }

        .input-group:focus-within {
            border-color: var(--primary-blue);
            box-shadow: 0 4px 25px rgba(48, 102, 180, 0.15);
            transform: translateY(-2px);
        }

        .input-group input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 15px 25px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            outline: none;
        }

        .input-group input::placeholder {
            color: #999;
        }

        .subscribe-btn {
            background-color: var(--primary-blue);
            color: var(--white);
            border: none;
            padding: 0 35px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(48, 102, 180, 0.3);
        }

        .subscribe-btn:hover {
            background-color: var(--dark-blue);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(48, 102, 180, 0.4);
        }

        /* Social Icons */
        .social-container {
            margin-bottom: 3rem;
        }

        .social-icons {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .social-link {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f7f9fa;
            color: var(--text-muted);
            border-radius: 50%;
            text-decoration: none;
            font-size: 1.4rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid #eaedf0;
        }

        .social-link:hover {
            background-color: var(--primary-blue);
            color: var(--white);
            transform: scale(1.1) translateY(-4px);
            box-shadow: 0 10px 20px rgba(48, 102, 180, 0.2);
            border-color: var(--primary-blue);
        }

        /* Footer & Branding */
        .footer {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            padding-bottom: 30px;
        }

        .developer-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            color: var(--text-muted);
            background: #f8fafc;
            padding: 10px 20px;
            border-radius: 100px;
            border: 1px solid #e2e8f0;
            transition: all 0.3s ease;
        }

        .developer-badge:hover {
            background: #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-color: #cbd5e1;
        }

        .developer-badge img {
            height: 24px;
            width: auto;
            object-fit: contain;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }
            .logo-text {
                font-size: 45px;
            }
            .logo-icon {
                width: 55px;
                height: 55px;
            }
            .logo-icon::before {
                font-size: 40px;
            }
            .logo-tagline-text {
                font-size: 16px;
            }
            .logo-text .bars span {
                width: 30px;
                height: 8px;
            }
            .input-group {
                flex-direction: column;
                background: transparent;
                border: none;
                box-shadow: none;
                padding: 0;
                gap: 15px;
            }
            .input-group input {
                background: var(--white);
                border: 1px solid #e1e4e8;
                border-radius: 50px;
                padding: 18px 25px;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            }
            .subscribe-btn {
                padding: 18px;
                border-radius: 50px;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>

    <div class="container">
        
        <!-- PexRise Logo Approximation -->
        <div class="logo-wrapper">
            <div class="logo-main">
                <div class="logo-icon">
                    <div class="decorative-bars"></div>
                </div>
                <div class="logo-text">
                    PExRiS
                    <div class="bars">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </div>
            </div>
            <div class="logo-tagline-text">People | Skills | Companies</div>
        </div>

        <p class="stay-tuned">Stay Tuned</p>
        
        <h1>We are building the <br> Pexhire Portal</h1>
        
        <p class="subtitle">Something beautiful is on the horizon. Be the first to know when we launch our new platform.</p>

        <form class="subscribe-form" action="#" method="POST" onsubmit="event.preventDefault(); alert('Thanks for subscribing!');">
            <div class="input-group">
                <input type="email" placeholder="Enter your email address to stay updated" required>
                <button type="submit" class="subscribe-btn">Notify Me</button>
            </div>
        </form>

        <div class="social-container">
            <div class="social-icons">
                <a href="#" class="social-link" aria-label="Instagram">
                    <i class="fab fa-instagram"></i>
                </a>
                <a href="#" class="social-link" aria-label="LinkedIn">
                    <i class="fab fa-linkedin-in"></i>
                </a>
                <a href="#" class="social-link" aria-label="Facebook">
                    <i class="fab fa-facebook-f"></i>
                </a>
            </div>
        </div>
    </div>

    <div class="footer">
        <a href="https://www.siliconmango.com" class="developer-badge">
            Developed by 
            <img src="images/logo/silicon-mango-logo.png" alt="Silicon Mango Logo" onerror="this.src='https://via.placeholder.com/150x40?text=Silicon+Mango'">
        </a>
    </div>
</body>
</html>
